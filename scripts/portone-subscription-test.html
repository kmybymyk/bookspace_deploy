<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PortOne Subscription Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      button {
        padding: 10px 14px;
        cursor: pointer;
      }
      input {
        width: min(560px, 100%);
        padding: 8px 10px;
      }
      pre {
        background: #111;
        color: #ddd;
        padding: 12px;
        border-radius: 8px;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>PortOne V2 정기결제 테스트</h1>
    <p>storeId: <code>store-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx</code></p>
    <p>toss channelKey: <code>channel-key-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx</code></p>

    <div class="row">
      <label for="customerId">customerId</label>
      <input id="customerId" value="bookspace-dev-user-1" />
    </div>

    <div class="row">
      <button id="issue-key">빌링키 발급</button>
      <button id="issue-and-pay">빌링키 발급+초회결제</button>
    </div>

    <pre id="out">버튼을 눌러 테스트를 시작하세요.</pre>

    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
      const storeId = "store-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx";
      const channelKey = "channel-key-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx";
      const out = document.getElementById("out");

      function customer() {
        const customerId = String(document.getElementById("customerId").value || "").trim() || "bookspace-dev-user-1";
        return {
          customerId,
          fullName: "Bookspace Dev",
          phoneNumber: "01000001234",
          email: "dev@bookspace.local",
        };
      }

      async function issueBillingKeyOnly() {
        const issueId = `issue-${Date.now()}`;
        out.textContent = `[issue] requesting...\nissueId=${issueId}`;
        try {
          const response = await PortOne.requestIssueBillingKey({
            storeId,
            channelKey,
            billingKeyMethod: "CARD",
            issueId,
            issueName: "Bookspace BillingKey Issue",
            displayAmount: 100,
            currency: "KRW",
            customer: customer(),
          });
          out.textContent = JSON.stringify({ mode: "issue", issueId, response }, null, 2);
        } catch (error) {
          out.textContent = JSON.stringify({ mode: "issue", issueId, error: error?.message ?? String(error) }, null, 2);
        }
      }

      async function issueBillingKeyAndPay() {
        const paymentId = `sub-${Date.now()}`;
        out.textContent = `[issue+pay] requesting...\npaymentId=${paymentId}`;
        try {
          const response = await PortOne.requestIssueBillingKeyAndPay({
            storeId,
            channelKey,
            billingKeyAndPayMethod: "CARD",
            paymentId,
            orderName: "Bookspace Monthly Subscription",
            totalAmount: 100,
            currency: "KRW",
            customer: customer(),
          });
          out.textContent = JSON.stringify({ mode: "issue+pay", paymentId, response }, null, 2);
        } catch (error) {
          out.textContent = JSON.stringify(
            { mode: "issue+pay", paymentId, error: error?.message ?? String(error) },
            null,
            2,
          );
        }
      }

      document.getElementById("issue-key").addEventListener("click", issueBillingKeyOnly);
      document.getElementById("issue-and-pay").addEventListener("click", issueBillingKeyAndPay);
    </script>
  </body>
</html>
