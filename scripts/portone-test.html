<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PortOne V2 Payment Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
      }
      button {
        margin-right: 8px;
        margin-bottom: 12px;
        padding: 10px 14px;
        cursor: pointer;
      }
      pre {
        background: #111;
        color: #ddd;
        padding: 12px;
        border-radius: 8px;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>PortOne V2 결제 테스트</h1>
    <p>스토어: <code>store-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx</code></p>

    <button id="pay-toss">토스 카드 결제</button>
    <button id="pay-paypal">페이팔 결제</button>
    <pre id="out">아래 버튼을 눌러 결제를 시작하세요.</pre>

    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
      const storeId = "store-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx";
      const tossChannelKey = "channel-key-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx";
      const paypalChannelKey = "channel-key-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx";

      const out = document.getElementById("out");

      async function runPayment(channelKey, label) {
        const paymentId = `test-${label}-${Date.now()}`;
        out.textContent = `[${label}] requesting...\npaymentId=${paymentId}`;
        try {
          const response = await PortOne.requestPayment({
            storeId,
            channelKey,
            paymentId,
            orderName: `Bookspace ${label} Test`,
            totalAmount: 100,
            currency: "CURRENCY_KRW",
            payMethod: "CARD",
          });
          out.textContent = JSON.stringify({ label, paymentId, response }, null, 2);
        } catch (error) {
          out.textContent = JSON.stringify(
            {
              label,
              paymentId,
              error: error?.message ?? String(error),
            },
            null,
            2,
          );
        }
      }

      document.getElementById("pay-toss").addEventListener("click", () => runPayment(tossChannelKey, "toss"));
      document
        .getElementById("pay-paypal")
        .addEventListener("click", () => runPayment(paypalChannelKey, "paypal"));
    </script>
  </body>
</html>
